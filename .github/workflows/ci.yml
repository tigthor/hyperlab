name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x', '24.x']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: harness + labs tests
        run: pnpm test

      - name: bench smoke
        run: node harness/bench/run.js --quick

  bare:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install bare runtime
        run: npm i -g bare

      - name: bare parity smoke
        run: bare harness/smoke-bare.js
